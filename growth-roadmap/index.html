<div id="ap-gate" style="position:fixed;inset:0;background:#040735;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Inter,'Helvetica Neue',Arial,sans-serif;padding:20px;">
  <div style="max-width:400px;width:100%;text-align:center;">
    <svg viewBox="0 0 108 72" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:56px;width:auto;margin:0 auto 32px;display:block">
      <text x="0" y="30" font-family="Inter,sans-serif" font-weight="800" font-size="30" fill="white" letter-spacing="-0.5">ad</text>
      <text x="0" y="58" font-family="Inter,sans-serif" font-weight="800" font-size="30" fill="white" letter-spacing="-0.5">pros</text>
      <rect x="0" y="64" width="96" height="7" rx="1.5" fill="#F9D900"/>
    </svg>
    <h2 style="color:#fff;font-size:20px;font-weight:700;margin-bottom:8px;">Protected Page</h2>
    <p style="color:#B0B1B6;font-size:14px;margin-bottom:24px;">Enter the password to continue.</p>
    <input type="password" id="ap-pw" autocomplete="off" placeholder="Password"
      style="width:100%;padding:14px 16px;background:#070b3d;border:1px solid #0e1358;border-radius:8px;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;"
      onkeydown="if(event.key==='Enter')ap_check()">
    <button onclick="ap_check()"
      style="width:100%;padding:14px;background:#F9D900;color:#040735;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;">
      Unlock
    </button>
    <p id="ap-err" style="color:#ff6b6b;font-size:13px;margin-top:12px;min-height:18px;"></p>
  </div>
</div>
<script>
(function(){
  var H="eec01e3d12195f67b579f4a31b329ef434cd60e18fe55cdc64f8d50cf7428d5d";
  var K="ap-ok-growth-roadmap";
  async function sha(s){var h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');}
  window.ap_check=async function(){
    var pw=document.getElementById('ap-pw').value;
    if(await sha(pw)===H){try{sessionStorage.setItem(K,'1');}catch(e){}reveal();}
    else{document.getElementById('ap-err').textContent='Incorrect password';}
  };
  function reveal(){
    var g=document.getElementById('ap-gate');if(g)g.style.display='none';
    var c=document.getElementById('ap-content');if(c)c.style.display='';
  }
  try{if(sessionStorage.getItem(K)==='1')reveal();}catch(e){}
  setTimeout(function(){var p=document.getElementById('ap-pw');if(p)p.focus();},50);
})();
</script>
<!-- AP-GATE END -->

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

const tabs = [
  "Overview",
  "Team & Capacity",
  "Growth Marketer Role",
  "Day in the Life",
  "AI Systems",
  "Training",
  "Phased Plan",
  "Open Decisions",
];

function Card({ title, children, accent, sub }) {
  return (
    <div style={{ background: "#1a1a2e", borderRadius: 10, padding: "24px 28px", borderLeft: accent ? `4px solid ${accent}` : "none", marginBottom: 16 }}>
      {title && (
        <div style={{ fontSize: 15, fontWeight: 700, color: "#e2e8f0", marginBottom: sub ? 2 : 12, letterSpacing: "0.01em" }}>
          {title}
        </div>
      )}
      {sub && (<div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 12 }}>{sub}</div>)}
      <div style={{ fontSize: 14, color: "#cbd5e1", lineHeight: 1.65 }}>{children}</div>
    </div>
  );
}

function Pill({ color, label }) {
  return (
    <span style={{ display: "inline-block", background: color + "22", color: color, fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20, marginRight: 6, letterSpacing: "0.03em" }}>
      {label}
    </span>
  );
}

function Stat({ value, label, sub }) {
  return (
    <div style={{ textAlign: "center", minWidth: 100 }}>
      <div style={{ fontSize: 32, fontWeight: 800, color: "#e2e8f0", fontFamily: "'DM Mono', monospace" }}>{value}</div>
      <div style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, marginTop: 2 }}>{label}</div>
      {sub && (<div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{sub}</div>)}
    </div>
  );
}

function Tag({ children, color = "#3b82f6" }) {
  return (
    <span style={{ display: "inline-block", background: color + "18", color: color, fontSize: 12, fontWeight: 600, padding: "4px 12px", borderRadius: 6, marginRight: 6, marginBottom: 6 }}>
      {children}
    </span>
  );
}

function Row({ left, right, divider = true }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "10px 0", borderBottom: divider ? "1px solid #ffffff0a" : "none", gap: 20 }}>
      <div style={{ flex: 1, fontSize: 13, color: "#94a3b8" }}>{left}</div>
      <div style={{ flex: 2, fontSize: 13, color: "#e2e8f0", textAlign: "right" }}>{right}</div>
    </div>
  );
}

function SplitCompare({ leftTitle, rightTitle, leftItems, rightItems, leftColor = "#ef4444", rightColor = "#22c55e" }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
      <div style={{ background: leftColor + "08", borderRadius: 10, padding: "20px 24px", border: `1px solid ${leftColor}22` }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: leftColor, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.05em" }}>
          {leftTitle}
        </div>
        {leftItems.map((item, i) => (
          <div key={i} style={{ fontSize: 13, color: "#94a3b8", padding: "5px 0", borderBottom: i < leftItems.length - 1 ? "1px solid #ffffff06" : "none" }}>{item}</div>
        ))}
      </div>
      <div style={{ background: rightColor + "08", borderRadius: 10, padding: "20px 24px", border: `1px solid ${rightColor}22` }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: rightColor, marginBottom: 12, textTransform: "uppercase", letterSpacing: "0.05em" }}>
          {rightTitle}
        </div>
        {rightItems.map((item, i) => (
          <div key={i} style={{ fontSize: 13, color: "#cbd5e1", padding: "5px 0", borderBottom: i < rightItems.length - 1 ? "1px solid #ffffff06" : "none" }}>{item}</div>
        ))}
      </div>
    </div>
  );
}

function Overview() {
  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 13, color: "#94a3b8", lineHeight: 1.7 }}>

        <Stat value="~6" label="Media Buying Clients" sub="After month-end changes" />
        <Stat value="8" label="Target Per Growth Marketer" sub="Stretch to 10" />
        <Stat value="16–20" label="Capacity Target" sub="Before next hire" />
      </div>
      <Card title="Current State" accent="#64748b">
        <Row left="Team" right="Kevin (HoG), Joao (TBD), Gabriel (Growth Marketer), JP (Growth Marketer)" />
        <Row left="Clients" right="~6 media buying clients after month-end" />
        <Row left="Model" right="Pod structure, traditional agency — pre-CAB" />
        <Row left="Tools" right="AdManage AI (bulk editor) in place. No AI automation in workflows yet." />
        <Row left="GS Role" right="Being eliminated. No Growth Strategist in the new model." />

      </Card>
      <Card title="Future State" accent="#22c55e">
        <Row left="Team" right="Kevin + 2 Growth Marketers (scaling to 3+ via reactive hiring)" />
        <Row left="Clients" right="8 per Growth Marketer. 16–20 with current team, 24–30 with 3 Growth Marketers." />

function TeamCapacity() {
  return (
    <div>
      <Card title="Growth Team — Current" accent="#64748b">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12, marginBottom: 8 }}>
          {[

      <Card title="Capacity Model" accent="#3b82f6">

function GMRole() {
  return (
    <div>
      <Card title="The Shift" accent="#3b82f6">
        <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 0 }}>

  const mondaySchedule = [
    { time: "8:00–10:00", activity: "Ad launches & QA", detail: "Batch launch day. Use AdManage AI to stage all new ads across accounts. Verify naming conventions, placements, budgets, creative assignments. QA everything before going live. This is the biggest time block of the week for launches.", tag: "Launches", color: "#22c55e" },

    { time: "3:30–4:00", activity: "Slack updates & async client comms", detail: "Send performance updates, respond to client questions, coordinate with Creative team on assets.", tag: "Client Facing", color: "#f59e0b" },
  ];
  const restOfWeekSchedule = [
    { time: "8:00–8:30", activity: "Check AI-generated performance alerts", detail: "Review overnight Slack notifications on what to scale, pause, or flag. Quick scan across all accounts for anomalies.", tag: "Analysis", color: "#3b82f6" },
    { time: "8:30–10:00", activity: "Deep account work", detail: "In-account decision-making: adjust bids, restructure campaigns, implement scaling moves, troubleshoot issues. This is the core execution window without Monday launch pressure.", tag: "Execution", color: "#22c55e" },

    "Build the Declining Performance Recovery Protocol — when KPIs drop 2+ consecutive weeks: diagnose root cause within 48 hours, present recovery plan to client within 72 hours, implement within 1 week, review at 2 weeks. Prevents silent decline into churn",
    "Build the Account Structure Methodology Library — a documented reference of testing structures, scaling frameworks, and account architecture options by business type and spend level. Gives Growth Marketers a playbook instead of reinventing per client",
    "Build channel expansion SOPs — internal playbooks for AppLovin, TikTok, and Microsoft so Growth Marketers can confidently set up and manage campaigns on secondary channels",
    "Track where workflows break under increased load — document bottlenecks as they appear so Phase 3 addresses real problems, not theoretical ones",
  ];
  const phase3 = [
    "Push each Growth Marketer toward 6–8 clients — continue controlled onboarding. Monitor quality metrics closely. If quality slips, slow down before it damages client relationships",
    "Deploy remaining AI tools — Strategy Document Builder turns performance insights into clean strategy docs for client sharing or internal planning",
    "Run end-of-quarter capacity audit — measure reality vs. plan: actual clients per Growth Marketer, time spent per client, which AI tools are used daily vs. ignored, where bottlenecks remain",
    "Identify hiring trigger — if pipeline is growing and Growth Marketers are consistently at 7+ clients, start recruiting. Have the Growth Marketer job spec ready before you need it",
    "Update the Growth Marketer growth track — rewrite the current growth tracks document to reflect the new model (no GS track, revised Growth Marketer responsibilities, Senior Growth Marketer path for advancement)",
    "Assess training progress — are Growth Marketers diagnosing instead of reporting? Owning calls without escalating? Contributing ideas in the shared channel? Adjust the training plan for Q2 based on what's actually improved vs. what hasn't",
    "Document what worked and what didn't — capture learnings from the quarter to inform Q2 planning",
    "Present results and updated roadmap to Nehal — show capacity numbers, revenue impact, AI adoption metrics, and the plan for next quarter",
  ];
  const beyond = [
    "Growth Intelligence Hub — central tool for data upload and automated analysis (longer-term build)",
    "AppLovin / TikTok partnership programs for client acquisition",
    "Updated Growth Tracks document reflecting the new model (no GS track, revised Growth Marketer track, Senior Growth Marketer path)",
    "Ongoing AI system refinement based on Growth Marketer feedback and usage data",
  ];
  const renderList = (items, color) => items.map((item, i) => (
    <div key={i} style={{ display: "flex", gap: 10, padding: "6px 0", fontSize: 13, color: "#cbd5e1" }}>
      <span style={{ color: color, fontWeight: 700 }}>→</span>{item}
    </div>
  ));
  return (
    <div>
      <Card title="Phase 1: Foundation" accent="#22c55e" sub="Weeks 1–4 · Hold at current client load">
        <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 14 }}>Remove the biggest time drains. Make structural decisions. Get AI builds started.</div>
        {renderList(phase1, "#22c55e")}
      </Card>
      <Card title="Phase 2: Integration" accent="#3b82f6" sub="Weeks 5–8 · Begin absorbing new clients">
        <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 14 }}>Deploy AI tools into daily workflows. Start shifting how Growth Marketers spend their time. Controlled client onboarding.</div>
        {renderList(phase2, "#3b82f6")}
      </Card>
      <Card title="Phase 3: Scale" accent="#a855f7" sub="Weeks 9–12 · Push toward capacity, validate the model">
        <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 14 }}>Increase client load. Identify what still breaks. Decide on hiring.</div>
        {renderList(phase3, "#a855f7")}
      </Card>
      <Card title="Beyond Q1" accent="#f59e0b" sub="Ongoing">
        <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 14 }}>Things that run in the background or start after the quarter.</div>
        {renderList(beyond, "#f59e0b")}
      </Card>
    </div>
  );
}

function OpenDecisions() {
  const decisions = [
    { q: "Confirm dev time allocation for Growth team AI builds", action: "Kevin and Nehal agree on a specific number of dev hours per week dedicated to Growth team tool builds. Without this, the AI roadmap in this plan doesn't start.", when: "Week 1", color: "#ef4444" },
    { q: "Lock in client service levels by tier — specifically, who owns top-tier relationships?", action: "Pricing is set. The open question is service level: do top-tier clients ($500k+) get Kevin owning the strategic relationship with the Growth Marketer doing media buying (similar to traditional model), or do Growth Marketers own everything regardless of spend? Also decide: do deliverables change by tier, or does every client get the same deliverables with only pricing and relationship ownership varying?", when: "Week 1", color: "#ef4444" },
    { q: "Review and sign off on the updated Growth Marketer role and daily workflow", action: "Review the Growth Marketer Role tab and Day in the Life tab. This becomes the standard communicated to the team. If Nehal wants changes to the split between automated vs. Growth Marketer-owned responsibilities, that needs to be decided before rollout.", when: "Week 1–2", color: "#ef4444" },
    { q: "Resolve Joao's role or transition plan", action: "The Growth Strategist role doesn't exist in the new model. Decide whether Joao transitions to a Growth Marketer role, moves to a different function, or exits. Communicate the decision. Leaving it open is a distraction for Kevin and the team.", when: "Week 1–3", color: "#f59e0b" },
    { q: "Source and approve external training for account management and channel expansion", action: "Kevin researches specific courses, masterclasses, or programs for account management / client communication training and brings a recommendation with pricing to Nehal. For channel expansion, explore both platform-provided training (free through partnerships) and external masterclasses or info products. Budget approval is needed, but sourcing can start now.", when: "Week 2–3", color: "#f59e0b" },
    { q: "Define how Growth Marketers maintain creative strategy awareness without pods", action: "In the traditional model, Growth Marketers naturally absorbed creative strategy by working in pods with creatives. In the new model where Growth and Creative can be purchased separately, that exposure disappears. Growth Marketers still need to understand creative performance, brief creatives, and evaluate what's working — but they won't get it through osmosis anymore. How does this get built into their workflow? No clear answer yet — needs discussion.", when: "Week 3–4", color: "#3b82f6" },
    { q: "Define the Growth Marketer hiring trigger and profile", action: "With 2 Growth Marketers and a target of 8 clients each, capacity maxes at ~16 media buying clients. Agree on when to trigger the next hire (e.g., when both Growth Marketers are at 7+ and pipeline shows continued growth) and what the Growth Marketer profile looks like for the new model.", when: "Week 4–6", color: "#3b82f6" },
  ];
  return (
    <div>
      <Card title="Action Items for Kevin & Nehal" accent="#f59e0b" sub="Decisions and approvals needed before or during Phase 1">
        <div style={{ fontSize: 13, color: "#94a3b8" }}>
          Sorted by urgency. Red = blocking Phase 1 execution. Orange = important within first few weeks. Blue = can wait slightly but should be defined this quarter.
        </div>
      </Card>
      {decisions.map((d, i) => (
        <div key={i} style={{ background: "#1a1a2e", borderRadius: 10, padding: "16px 20px", marginBottom: 8, borderLeft: `4px solid ${d.color}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#e2e8f0", flex: 1, minWidth: 200 }}>{d.q}</div>
            <Pill color={d.color} label={d.when} />
          </div>
          <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 6 }}>{d.action}</div>
        </div>
      ))}
    </div>
  );
}

const tabContent = {
  "Overview": Overview,
  "Team & Capacity": TeamCapacity,
  "Growth Marketer Role": GMRole,
  "Day in the Life": DayInLife,
  "AI Systems": AISystems,
  "Training": Training,
  "Phased Plan": PhasedPlan,
  "Open Decisions": OpenDecisions,
};

function GrowthRoadmap() {
  const [activeTab, setActiveTab] = useState("Overview");
  const Content = tabContent[activeTab];
  return (
    <div style={{ background: "#0f0f23", color: "#e2e8f0", fontFamily: "'DM Sans', system-ui, -apple-system, sans-serif", padding: "32px 28px" }}>
      <div style={{ display: "flex", gap: 4, overflowX: "auto", padding: "0 0 16px", borderBottom: "1px solid #ffffff0a", marginBottom: 24 }}>
        {tabs.map((tab) => (
          <button key={tab} onClick={() => setActiveTab(tab)} style={{ background: activeTab === tab ? "#1a1a2e" : "transparent", color: activeTab === tab ? "#e2e8f0" : "#64748b", border: activeTab === tab ? "1px solid #ffffff15" : "1px solid transparent", borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: activeTab === tab ? 700 : 500, cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.15s", fontFamily: "inherit" }}>
            {tab}
          </button>
        ))}
      </div>
      <Content />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("roadmap-root")).render(<GrowthRoadmap />);
</script>
