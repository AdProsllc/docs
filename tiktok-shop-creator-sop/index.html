const calloutBox = (children, type = "info") => {
  const colors = {
    info: { bg: "rgba(212,168,83,0.08)", border: "rgba(212,168,83,0.3)", icon: "💡" },

    metric: { bg: "rgba(80,180,120,0.08)", border: "rgba(80,180,120,0.3)", icon: "📊" },
    action: { bg: "rgba(100,140,220,0.08)", border: "rgba(100,140,220,0.3)", icon: "🎯" },
  };
  const c = colors[type];
  return (
    <div style={{
      padding: "14px 16px",
      background: c.bg,
      borderLeft: `3px solid ${c.border}`,
      borderRadius: "0 6px 6px 0",
      marginBottom: "16px",
      fontSize: "13px",
      lineHeight: 1.6,
      color: "rgba(245,240,232,0.85)",

      <span style={{ marginRight: "8px" }}>{c.icon}</span>
      {children}
    </div>
  );
};
