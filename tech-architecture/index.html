from core.brand_context import load_brand
from core.audit_logger import log_run
from core.llm import call_claude

import time, traceback

class BaseAgent:
    """Every agent inherits from this.
    Junior dev only implements: execute()"""

    name = "base"           # Override in subclass
    version = "1.0.0"       # Bump on changes

    def __init__(self, brand_id: str):
        self.brand = load_brand(brand_id)
        self.start_time = None
        self.tokens_used = 0

    async def run(self) -> dict:
        """DON'T OVERRIDE THIS. It wraps execute()
        with logging, timing, and error handling."""
        self.start_time = time.time()
        try:
            result = await self.execute()
            await log_run(
                agent=self.name,
                brand_id=self.brand["id"],
                status="success",
                duration=time.time() - self.start_time,
                tokens=self.tokens_used,
                output_summary=result.get("summary","")
            )
            return result
        except Exception as e:
            await log_run(
                agent=self.name,
                brand_id=self.brand["id"],
                status="error",
                error=traceback.format_exc()
            )
            raise

    async def execute(self) -> dict:
        """OVERRIDE THIS in your agent.
        Must return a dict with structured data."""
        raise NotImplementedError

    async def think(self, prompt: str,
                     model: str = "sonnet") -> str:
        """Call Claude. Use this, not raw API."""
        response = await call_claude(
            prompt=prompt,
            model=model,
            brand_context=self.brand
        )
        self.tokens_used += response["tokens"]
        return response["text"]

    async def deliver(self, data: dict,
                       channels: list = ["slack"]):
        """Send output to delivery channels.
        Data is ALWAYS structured JSON first."""
        for channel in channels:
            await render(channel, data, self.brand)`,

class BaseConnector(ABC):
    """All connectors inherit from this."""

    name = "base"

        elapsed = time.time() - self._last_call

import inngest

client = inngest.Inngest(app_id="adpros-agents")

# 1. TRIGGER: fires once at 6am EST
@client.create_function(
    fn_id="daily-scorecard-trigger",
    trigger=inngest.TriggerCron(cron="0 6 * * *"),
)
async def trigger_all_scorecards(ctx):
    """Fan-out: sends 1 event per active brand."""
    brands = await get_active_brands()

    for brand in brands:
        await inngest.send(inngest.Event(
            name="scorecard/run",
            data={"brand_id": brand["id"]}
        ))

    return {"triggered": len(brands)}


# 2. WORKER: runs once PER BRAND (100 copies in parallel)
@client.create_function(
    fn_id="run-brand-scorecard",
    trigger=inngest.TriggerEvent(event="scorecard/run"),
    # Concurrency: max 20 brands at once
    # (respects API rate limits)
    concurrency=[
        inngest.Concurrency(limit=20)
    ],
    retries=3,  # Auto-retry on failure
)
async def run_scorecard(ctx):
    brand_id = ctx.event.data["brand_id"]

    # Step 1: Pull data (durable — retries on failure)
    data = await ctx.step.run(
        "fetch-data",
        lambda: fetch_all_platform_data(brand_id)
    )

    # Step 2: Classify ads
    classified = await ctx.step.run(
        "classify-ads",
        lambda: classify_all_ads(brand_id, data)
    )

    # Step 3: Generate scorecard
    scorecard = await ctx.step.run(
        "generate-scorecard",
        lambda: generate_scorecard(brand_id, classified)
    )

    # Step 4: Deliver
    await ctx.step.run(
        "deliver",
        lambda: deliver_scorecard(brand_id, scorecard)
    )

    return {"brand": brand_id, "ads_classified": len(classified)}`,

from enum import Enum
from delivery.slack import send_approval_request

class RiskLevel(Enum):
    AUTO = "auto"           # Just do it
    NOTIFY = "notify"       # Do it + tell someone
    APPROVE = "approve"     # Ask first, wait for human

# Which actions need what approval level
ACTION_RISK = {
    "send_slack_alert": RiskLevel.AUTO,
    "generate_report": RiskLevel.AUTO,
    "create_clickup_task": RiskLevel.AUTO,
    "post_daily_digest": RiskLevel.NOTIFY,
    "flag_ad_for_pause": RiskLevel.APPROVE,
    "recommend_budget_change": RiskLevel.APPROVE,
    "modify_campaign_status": RiskLevel.APPROVE,
}

async def gate(action: str, brand_id: str,
               details: dict) -> bool:
    """Check if action can proceed."""
    risk = ACTION_RISK.get(action, RiskLevel.APPROVE)

    if risk == RiskLevel.AUTO:
        return True  # Just do it

    if risk == RiskLevel.NOTIFY:
        await send_notification(brand_id, action, details)
        return True  # Do it, but tell people

    if risk == RiskLevel.APPROVE:
        # Send Slack approval request with buttons
        approval = await send_approval_request(
            brand_id=brand_id,
            action=action,
            details=details,
            timeout_hours=4,
            escalation_user=get_escalation_user(brand_id)
        )
        return approval.approved  # Wait for human`,

    fix: "Week 0-1 is 100% data infrastructure. Resist the urge to build the cool AI stuff first.",
  },
  {
    title: "Testing on real client data from Day 1",
    severity: "CRITICAL",
    explanation: "One bad Slack message to a client's shared channel and you lose trust permanently. All development happens against the test brand. Real clients only see agent output after manual verification.",
    fix: "Create 'brand_test' with realistic fake data. All dev and testing uses this brand. Gate real brands behind a feature flag.",
  },
  {
    title: "Returning formatted strings instead of structured JSON",
    severity: "HIGH",
    explanation: "If an agent returns a formatted Slack message directly, it can ONLY be delivered to Slack. When you need the same data in Looker, Slides, or the web portal, you have to rebuild the agent. This is how technical debt becomes unmanageable.",

  },
  {
    title: "Hardcoding brand-specific logic into agents",
    severity: "HIGH",

  },
  {
    title: "Skipping the audit log",

  {
    title: "Running all brands sequentially instead of fan-out",
    severity: "MEDIUM",

  {

}
